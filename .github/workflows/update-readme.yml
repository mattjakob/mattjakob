name: Update README
run-name: Update recent repositories

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate recent repos section
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Fetch 6 most recently pushed repos (non-fork, non-profile)
          repos=$(gh api graphql -f query='
            query {
              user(login: "mattjakob") {
                repositories(
                  first: 6
                  orderBy: { field: PUSHED_AT, direction: DESC }
                  isFork: false
                  privacy: PUBLIC
                ) {
                  nodes {
                    name
                  }
                }
              }
            }
          ' --jq '.data.user.repositories.nodes[].name' | grep -v '^mattjakob$' | head -6)

          # Build repo cards markdown
          cards=""
          count=0
          while IFS= read -r repo; do
            dark_src="https://github-readme-stats.vercel.app/api/pin/?username=mattjakob&repo=${repo}&show_owner=true&hide_border=true&bg_color=00000000&title_color=fff&text_color=aaa&icon_color=fff"
            light_src="https://github-readme-stats.vercel.app/api/pin/?username=mattjakob&repo=${repo}&show_owner=true&hide_border=true&bg_color=00000000&title_color=000&text_color=555&icon_color=000"

            cards+="<a href=\"https://github.com/mattjakob/${repo}\"><picture>"
            cards+="<source media=\"(prefers-color-scheme: dark)\" srcset=\"${dark_src}\">"
            cards+="<img src=\"${light_src}\" width=\"49%\" alt=\"${repo}\" />"
            cards+="</picture></a>"

            count=$((count + 1))
            if [ $((count % 2)) -eq 0 ]; then
              cards+=$'\n'
            else
              cards+="&nbsp;"
            fi
          done <<< "$repos"

          # Replace content between markers
          awk -v cards="$cards" '
            /<!-- REPOS:START -->/ { print; print cards; skip=1; next }
            /<!-- REPOS:END -->/ { skip=0 }
            !skip { print }
          ' README.md > README.tmp
          mv README.tmp README.md

      - name: Commit if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md && exit 0
          git add README.md
          git commit -m "chore: update recent repositories"
          git push
